# ============================================
# Nginx 反向代理配置示例
# ============================================
# 用法：
#   1. 将 haofeng.gwy.com 替换为你的域名
#   2. 将文件复制到 /etc/nginx/sites-available/haofeng-gwy
#   3. ln -s /etc/nginx/sites-available/haofeng-gwy /etc/nginx/sites-enabled/
#   4. nginx -t && nginx -s reload
#   5. 配置 SSL（推荐用 certbot / acme.sh）
# ============================================

upstream haofeng_backend {
    server 127.0.0.1:5050;
    keepalive 16;
}

server {
    listen 80;
    server_name haofeng.gwy.com;

    # 301 跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name haofeng.gwy.com;

    # SSL 证书（用 certbot 自动获取）
    ssl_certificate     /etc/letsencrypt/live/haofeng.gwy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haofeng.gwy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 静态文件缓存
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 代理到 Flask
    location / {
        proxy_pass http://haofeng_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
